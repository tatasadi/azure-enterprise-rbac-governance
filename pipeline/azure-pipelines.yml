# Azure Enterprise RBAC & Governance Pipeline
# Manages Management Groups, RBAC, Custom Roles, Policies, and PIM via Terraform
# Auth model: Azure DevOps Service Connection with Workload Identity Federation (OIDC) (no secrets)
# Flow: Validate -> Plan (+ RBAC diff) -> Manual Approval (main only) -> Apply (prod environment)

trigger:
  branches:
    include: [main]
  paths:
    include:
      - management-groups/**
      - rbac/**
      - custom-roles/**
      - policies/**
      - pim/**

pr:
  branches:
    include: [main]
  paths:
    include:
      - management-groups/**
      - rbac/**
      - custom-roles/**
      - policies/**
      - pim/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: terraform-variables
  - name: TF_VERSION
    value: "1.5.7"

# IMPORTANT:
# - Your Terraform provider should NOT rely on Azure CLI auth for Service Connections.
# - Keep provider "azurerm" with use_cli = false (or omit it) and authenticate via env/OIDC.
# - Ensure the pipeline setting "Allow scripts to access OAuth token" is enabled for jobs
#   that run Terraform (needed for token refresh with long approval gates).

stages:
  # ==============================================================================
  # STAGE 1: VALIDATION
  # ==============================================================================
  - stage: Validate
    displayName: "Validate Terraform Code"
    jobs:
      - job: TerraformValidate
        displayName: "Terraform Validation"
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: Bash@3
            displayName: "Terraform Format Check"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                terraform fmt -check -recursive
                echo "✓ All Terraform files are properly formatted"

          - task: Bash@3
            displayName: "Terraform Init + Validate (no backend)"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                for dir in management-groups rbac custom-roles policies pim; do
                  if [ -d "$dir" ]; then
                    echo "Validating $dir..."
                    pushd "$dir" >/dev/null
                    terraform init -backend=false -input=false
                    terraform validate
                    popd >/dev/null
                  else
                    echo "Skipping $dir (folder not found)"
                  fi
                done

      - job: SecurityScanning
        displayName: "Security Scanning (Checkov)"
        dependsOn: TerraformValidate
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: "Use Python 3.x"
            inputs:
              versionSpec: "3.x"

          - task: Bash@3
            displayName: "Install & Run Checkov"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                python -m pip install --upgrade pip
                pip install checkov
                checkov -d . --framework terraform --soft-fail
                echo "✓ Security scan completed"

  # ==============================================================================
  # STAGE 2: PLAN
  # ==============================================================================
  - stage: Plan
    displayName: "Terraform Plan"
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: PlanManagementGroups
        displayName: "Plan - Management Groups"
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AzureCLI@2
            displayName: "Terraform Plan - Management Groups"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if [ ! -d "management-groups" ]; then
                  echo "Skipping: management-groups folder not found."
                  exit 0
                fi

                cd management-groups
                echo "Planning Management Groups..."

                # --- OIDC / Workload Identity Federation auth for Terraform ---
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"
                # Token refresh support (important with manual approvals / long-running pipelines)
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                terraform init -input=false \
                  -backend-config="resource_group_name=$(TF_STATE_RG)" \
                  -backend-config="storage_account_name=$(TF_STATE_SA)" \
                  -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                  -backend-config="key=management-groups.tfstate"

                terraform plan -input=false -no-color -out=tfplan
                terraform show -json tfplan > plan.json
                ls -lh tfplan plan.json
            env:
              # Enables OIDC token refresh flow for Terraform when needed
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
              TF_VAR_subscription_platform_connectivity: $(TF_VAR_subscription_platform_connectivity)
              TF_VAR_subscription_platform_identity: $(TF_VAR_subscription_platform_identity)
              TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
              TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)

          - task: PublishPipelineArtifact@1
            displayName: "Publish MG Plan"
            inputs:
              targetPath: "management-groups/tfplan"
              artifact: "mg-terraform-plan"

          - task: PublishPipelineArtifact@1
            displayName: "Publish MG Plan JSON"
            inputs:
              targetPath: "management-groups/plan.json"
              artifact: "mg-plan-json"

      - job: PlanRBAC
        displayName: "Plan - RBAC"
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AzureCLI@2
            displayName: "Terraform Plan - RBAC"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if [ ! -d "rbac" ]; then
                  echo "Skipping: rbac folder not found."
                  exit 0
                fi

                cd rbac
                echo "Planning RBAC..."

                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                terraform init -input=false \
                  -backend-config="resource_group_name=$(TF_STATE_RG)" \
                  -backend-config="storage_account_name=$(TF_STATE_SA)" \
                  -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                  -backend-config="key=rbac.tfstate"

                terraform plan -input=false -no-color -out=tfplan
                terraform show -json tfplan > plan.json
                ls -lh tfplan plan.json
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
              TF_VAR_group_owners: $(TF_VAR_group_owners)
              TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
              TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)

          - task: PublishPipelineArtifact@1
            displayName: "Publish RBAC Plan"
            inputs:
              targetPath: "rbac/tfplan"
              artifact: "rbac-terraform-plan"

          - task: PublishPipelineArtifact@1
            displayName: "Publish RBAC Plan JSON"
            inputs:
              targetPath: "rbac/plan.json"
              artifact: "rbac-plan-json"

      - job: PlanCustomRoles
        displayName: "Plan - Custom Roles"
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AzureCLI@2
            displayName: "Terraform Plan - Custom Roles"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if [ ! -d "custom-roles" ]; then
                  echo "Skipping: custom-roles folder not found."
                  exit 0
                fi

                cd custom-roles
                echo "Planning Custom Roles..."

                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                terraform init -input=false \
                  -backend-config="resource_group_name=$(TF_STATE_RG)" \
                  -backend-config="storage_account_name=$(TF_STATE_SA)" \
                  -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                  -backend-config="key=custom-roles.tfstate"

                terraform plan -input=false -no-color -out=tfplan
                terraform show -json tfplan > plan.json
                ls -lh tfplan plan.json
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
              TF_VAR_management_group_landing_zones: $(TF_VAR_management_group_landing_zones)
              TF_VAR_management_group_nonprod: $(TF_VAR_management_group_nonprod)
              TF_VAR_management_group_prod: $(TF_VAR_management_group_prod)

          - task: PublishPipelineArtifact@1
            displayName: "Publish Custom Roles Plan"
            inputs:
              targetPath: "custom-roles/tfplan"
              artifact: "roles-terraform-plan"

          - task: PublishPipelineArtifact@1
            displayName: "Publish Custom Roles Plan JSON"
            inputs:
              targetPath: "custom-roles/plan.json"
              artifact: "roles-plan-json"

      - job: PlanPolicies
        displayName: "Plan - Policies"
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AzureCLI@2
            displayName: "Terraform Plan - Policies"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if [ ! -d "policies" ]; then
                  echo "Skipping: policies folder not found."
                  exit 0
                fi

                cd policies
                echo "Planning Policies..."

                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                terraform init -input=false \
                  -backend-config="resource_group_name=$(TF_STATE_RG)" \
                  -backend-config="storage_account_name=$(TF_STATE_SA)" \
                  -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                  -backend-config="key=policies.tfstate"

                terraform plan -input=false -no-color -out=tfplan
                terraform show -json tfplan > plan.json
                ls -lh tfplan plan.json
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
              TF_VAR_group_owners: $(TF_VAR_group_owners)
              TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
              TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)

          - task: PublishPipelineArtifact@1
            displayName: "Publish Policies Plan"
            inputs:
              targetPath: "policies/tfplan"
              artifact: "policies-terraform-plan"

          - task: PublishPipelineArtifact@1
            displayName: "Publish Policies Plan JSON"
            inputs:
              targetPath: "policies/plan.json"
              artifact: "policies-plan-json"

      - job: AnalyzeRBACChanges
        displayName: "Analyze RBAC Changes"
        dependsOn:
          - PlanManagementGroups
          - PlanRBAC
          - PlanCustomRoles
          - PlanPolicies
          - PlanPIM
        steps:
          - checkout: self

          - download: current
            artifact: rbac-plan-json

          - task: UsePythonVersion@0
            displayName: "Use Python 3.x"
            inputs:
              versionSpec: "3.x"

          - task: Bash@3
            displayName: "Generate RBAC Change Summary (Markdown)"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                PLAN_JSON="$(Pipeline.Workspace)/rbac-plan-json/plan.json"
                if [ ! -f "$PLAN_JSON" ]; then
                  echo "RBAC plan.json not found at $PLAN_JSON - skipping diff generation."
                  exit 0
                fi

                # Script writes to $(Build.ArtifactStagingDirectory)/rbac-changes.md
                python3 "$(System.DefaultWorkingDirectory)/pipeline/scripts/parse-rbac-changes.py" "$PLAN_JSON"

                echo "Generated:"
                ls -lh "$(Build.ArtifactStagingDirectory)/rbac-changes.md"

          - task: PublishPipelineArtifact@1
            displayName: "Publish RBAC Change Summary"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/rbac-changes.md"
              artifact: "rbac-change-summary"
            condition: succeededOrFailed()

  # ==============================================================================
  # STAGE 3: APPROVAL (main only)
  # ==============================================================================
  - stage: Approve
    displayName: "Manual Approval Gate"
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: ApprovalGate
        displayName: "Security & Platform Team Approval"
        pool: server
        timeoutInMinutes: 10080 # 7 days
        steps:
          - task: ManualValidation@0
            displayName: "Approve RBAC & Governance Changes"
            inputs:
              notifyUsers: |
                $(SECURITY_TEAM_EMAIL)
                $(PLATFORM_TEAM_EMAIL)
              instructions: |
                CRITICAL: Review Terraform plans for RBAC, PIM, and Policy changes.

                📋 Review Checklist:
                ✓ Download and review all plan artifacts
                ✓ Check RBAC Change Summary for role assignment modifications
                ✓ Verify no unauthorized privilege escalations
                ✓ Confirm changes align with approved change ticket
                ✓ Validate custom role permissions are least-privilege
                ✓ Review policy assignments and exemptions
                ✓ Review PIM changes (eligible/active assignments, policies)

                ⚠️ High-Risk Changes to Watch For:
                - New Owner role assignments
                - New User Access Administrator assignments
                - Modifications to PIM configuration/policies
                - Changes to deny policies
                - Custom role permission expansions

                📎 Artifacts to Review:
                - mg-terraform-plan (Management Groups)
                - rbac-terraform-plan (Role Assignments)
                - roles-terraform-plan (Custom Roles)
                - policies-terraform-plan (Azure Policies)
                - pim-terraform-plan (PIM)
                - rbac-change-summary (RBAC Diff)

                🎟️ Required: Link to approved change ticket

                Approve only if all checks pass and change is authorized.
              onTimeout: reject

  # ==============================================================================
  # STAGE 4: APPLY
  # ==============================================================================
  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Approve
    condition: succeeded()
    jobs:
      - deployment: ApplyManagementGroups
        displayName: "Apply - Management Groups"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@0
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - download: current
                  artifact: mg-terraform-plan

                - task: AzureCLI@2
                  displayName: "Terraform Apply - Management Groups"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ ! -d "management-groups" ]; then
                        echo "Skipping: management-groups folder not found."
                        exit 0
                      fi

                      cd management-groups
                      echo "Applying Management Groups..."

                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                      terraform init -input=false \
                        -backend-config="resource_group_name=$(TF_STATE_RG)" \
                        -backend-config="storage_account_name=$(TF_STATE_SA)" \
                        -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                        -backend-config="key=management-groups.tfstate"

                      terraform apply -input=false -auto-approve \
                        "$(Pipeline.Workspace)/mg-terraform-plan/tfplan"

                      echo "✓ Management Groups applied successfully"
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
                    TF_VAR_subscription_platform_connectivity: $(TF_VAR_subscription_platform_connectivity)
                    TF_VAR_subscription_platform_identity: $(TF_VAR_subscription_platform_identity)
                    TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
                    TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)
                    

      - deployment: ApplyCustomRoles
        displayName: "Apply - Custom Roles"
        dependsOn: ApplyManagementGroups
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@0
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - download: current
                  artifact: roles-terraform-plan

                - task: AzureCLI@2
                  displayName: "Terraform Apply - Custom Roles"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ ! -d "custom-roles" ]; then
                        echo "Skipping: custom-roles folder not found."
                        exit 0
                      fi

                      cd custom-roles
                      echo "Applying Custom Roles..."

                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                      terraform init -input=false \
                        -backend-config="resource_group_name=$(TF_STATE_RG)" \
                        -backend-config="storage_account_name=$(TF_STATE_SA)" \
                        -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                        -backend-config="key=custom-roles.tfstate"

                      terraform apply -input=false -auto-approve \
                        "$(Pipeline.Workspace)/roles-terraform-plan/tfplan"

                      echo "✓ Custom Roles applied successfully"
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
                    TF_VAR_management_group_landing_zones: $(TF_VAR_management_group_landing_zones)
                    TF_VAR_management_group_nonprod: $(TF_VAR_management_group_nonprod)
                    TF_VAR_management_group_prod: $(TF_VAR_management_group_prod)

      - deployment: ApplyRBAC
        displayName: "Apply - RBAC"
        dependsOn: ApplyCustomRoles
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@0
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - download: current
                  artifact: rbac-terraform-plan

                - task: AzureCLI@2
                  displayName: "Terraform Apply - RBAC"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ ! -d "rbac" ]; then
                        echo "Skipping: rbac folder not found."
                        exit 0
                      fi

                      cd rbac
                      echo "Applying RBAC..."

                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                      terraform init -input=false \
                        -backend-config="resource_group_name=$(TF_STATE_RG)" \
                        -backend-config="storage_account_name=$(TF_STATE_SA)" \
                        -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                        -backend-config="key=rbac.tfstate"

                      terraform apply -input=false -auto-approve \
                        "$(Pipeline.Workspace)/rbac-terraform-plan/tfplan"

                      echo "✓ RBAC applied successfully"
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
                    TF_VAR_group_owners: $(TF_VAR_group_owners)
                    TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
                    TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)

      - deployment: ApplyPolicies
        displayName: "Apply - Policies"
        dependsOn: ApplyRBAC
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@0
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - download: current
                  artifact: policies-terraform-plan

                - task: AzureCLI@2
                  displayName: "Terraform Apply - Policies"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ ! -d "policies" ]; then
                        echo "Skipping: policies folder not found."
                        exit 0
                      fi

                      cd policies
                      echo "Applying Policies..."

                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID="${AZURESUBSCRIPTION_SERVICE_CONNECTION_ID:-}"

                      terraform init -input=false \
                        -backend-config="resource_group_name=$(TF_STATE_RG)" \
                        -backend-config="storage_account_name=$(TF_STATE_SA)" \
                        -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                        -backend-config="key=policies.tfstate"

                      terraform apply -input=false -auto-approve \
                        "$(Pipeline.Workspace)/policies-terraform-plan/tfplan"

                      echo "✓ Policies applied successfully"
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
                    TF_VAR_group_owners: $(TF_VAR_group_owners)
                    TF_VAR_subscription_workload_nonprod: $(TF_VAR_subscription_workload_nonprod)
                    TF_VAR_subscription_workload_prod: $(TF_VAR_subscription_workload_prod)

      - job: PostDeploymentSummary
        displayName: "Generate Deployment Summary"
        dependsOn: ApplyPIM
        condition: succeeded()
        steps:
          - task: Bash@3
            displayName: "Print Summary"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                echo "## 🎉 Azure RBAC & Governance Deployment Complete"
                echo ""
                echo "### Deployment Summary"
                echo "- **Pipeline Run:** $(Build.BuildNumber)"
                echo "- **Triggered By:** $(Build.RequestedFor)"
                echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
                echo ""
                echo "### Components Deployed"
                echo "✓ Management Groups"
                echo "✓ Custom RBAC Roles"
                echo "✓ Role Assignments"
                echo "✓ Azure Policies"
                echo "✓ PIM"
                echo ""
                echo "### Next Steps"
                echo "1. Verify changes in Azure Portal"
                echo "2. Test PIM activation workflows"
                echo "3. Review policy compliance dashboard"
                echo "4. Update documentation if needed"
                echo ""
                echo "### Monitoring"
                echo "- Monitor Azure Activity Log for the next 24-48 hours"
                echo "- Review PIM activation requests"
                echo "- Check Azure Policy compliance status"